<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JMagalhães — Prospecção de Madeireiras</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f7f4;color:#1a1a1a;min-height:100vh}
.app{max-width:800px;margin:0 auto;padding:16px}
.header{margin-bottom:20px}
.header h1{font-size:20px;font-weight:600}
.header p{font-size:13px;color:#888}
.tabs{display:flex;gap:4px;border-bottom:1px solid #e5e3dc;margin-bottom:16px}
.tab{padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;color:#888}
.tab.active{border-bottom-color:#1a1a1a;color:#1a1a1a}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.stat{border-radius:8px;padding:10px 12px}
.stat-label{font-size:11px;color:#888}
.stat-val{font-size:22px;font-weight:600}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.filters input,.filters select{font-size:12px;padding:6px 8px;border:1px solid #e5e3dc;border-radius:6px;background:#fff}
.filters input{flex:1;min-width:100px}
.lead-card{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.lead-card:hover{border-color:#888}
.lead-card.alto{border:2px solid #5DCAA5}
.lead-card.medio{border:1px solid #EF9F27}
.lead-card.desconhecido{border:1px solid #e5e3dc}
.lead-card.baixo{border:1px solid #F09595;opacity:.6}
.lead-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.score-badge{font-size:12px;font-weight:600;padding:2px 10px;border-radius:6px;min-width:32px;text-align:center}
.lead-name{font-size:14px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill{font-size:11px;font-weight:500;padding:2px 8px;border-radius:6px;white-space:nowrap}
.lead-meta{font-size:12px;color:#888}
.especies{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
.esp-tag{font-size:10px;padding:1px 6px;border-radius:4px}
.lead-detail{margin-top:10px;padding-top:10px;border-top:1px solid #f0efe8;font-size:12px;display:none}
.lead-card.open .lead-detail{display:block}
.lead-detail .addr{color:#888;margin-bottom:4px}
.lead-detail .info{color:#888;font-style:italic;line-height:1.6}
.btn-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.btn{font-size:11px;padding:5px 10px;border:1px solid #e5e3dc;border-radius:6px;background:#fff;cursor:pointer}
.btn:hover{background:#f0efe8}
.btn-primary{background:#1D9E75;color:#fff;border:none;padding:12px;font-size:14px;font-weight:500;border-radius:8px;cursor:pointer;width:100%}
.btn-primary:hover{background:#178a65}
.btn-primary:disabled{background:#e5e3dc;color:#888;cursor:default}
.search-section label{font-size:12px;color:#888;display:block;margin-bottom:4px}
.search-section input[type=text]{width:100%;padding:8px 10px;font-size:14px;border:1px solid #e5e3dc;border-radius:6px}
.search-section input[type=range]{width:100%}
.tipo-chips{display:flex;flex-wrap:wrap;gap:6px}
.tipo-chip{font-size:12px;padding:5px 10px;border-radius:6px;cursor:pointer;border:1px solid #e5e3dc;background:#fff;user-select:none}
.tipo-chip.on{border-color:#1D9E75;background:#E1F5EE}
.result-count{font-size:12px;color:#888;margin-bottom:10px}
.city-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:#f0efe8;border-radius:8px;margin-bottom:4px;font-size:13px}
.city-name{font-weight:500}
.empty{text-align:center;padding:30px;color:#888;font-size:13px}
.loading{text-align:center;padding:40px;color:#888}
.alto-bg{background:#E1F5EE}.alto-c{color:#085041}
.medio-bg{background:#FAEEDA}.medio-c{color:#633806}
.desc-bg{background:#f0efe8}.desc-c{color:#5F5E5A}
.baixo-bg{background:#FCEBEB}.baixo-c{color:#791F1F}
.quente-bg{background:#E1F5EE}.quente-c{color:#0F6E56}
.morno-bg{background:#FAEEDA}.morno-c{color:#854F0B}
.frio-bg{background:#E6F1FB}.frio-c{color:#0C447C}
.descartado-bg{background:#f0efe8}.descartado-c{color:#444}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <h1>JMagalhães — Prospecção</h1>
    <p>Madeiras de lei · Serrarias RO e AM · <span id="total-count">0</span> leads</p>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="dashboard">Dashboard</button>
    <button class="tab" data-tab="buscar">Buscar</button>
    <button class="tab" data-tab="stats">Resumo</button>
  </div>

  <!-- DASHBOARD -->
  <div id="tab-dashboard">
    <div class="stats" id="stats-bar"></div>
    <div class="filters">
      <input type="text" id="fil-q" placeholder="Buscar empresa...">
      <select id="fil-af"><option value="">Afinidade</option><option value="alto">Mad. de lei</option><option value="medio">Provável</option><option value="desconhecido">A verificar</option><option value="baixo">Descartado</option></select>
      <select id="fil-st"><option value="">Status</option><option value="quente">Quente</option><option value="morno">Morno</option><option value="frio">Frio</option><option value="descartado">Descartado</option></select>
      <select id="fil-cid"><option value="">Cidade</option></select>
    </div>
    <div class="result-count" id="result-count"></div>
    <div id="leads-list"></div>
  </div>

  <!-- BUSCAR -->
  <div id="tab-buscar" style="display:none">
    <div class="search-section" style="margin-bottom:14px">
      <label>Cidade / região</label>
      <input type="text" id="s-cidade" placeholder="Ex: Uberlândia MG, Curitiba PR...">
    </div>
    <div class="search-section" style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <label>Raio</label>
        <span id="s-raio-val" style="font-size:14px;font-weight:500">50 km</span>
      </div>
      <input type="range" id="s-raio" min="10" max="200" step="10" value="50">
    </div>
    <div class="search-section" style="margin-bottom:14px">
      <label style="margin-bottom:6px">Tipos de empresa</label>
      <div class="tipo-chips" id="tipo-chips"></div>
    </div>
    <button class="btn-primary" id="btn-buscar" disabled>Buscar madeireiras</button>
    <p style="font-size:11px;color:#888;margin-top:8px;text-align:center">Busca via Google Places + scoring por madeira de lei</p>
  </div>

  <!-- STATS -->
  <div id="tab-stats" style="display:none">
    <h3 style="font-size:14px;font-weight:500;margin-bottom:10px">Por cidade</h3>
    <div id="city-stats"></div>
    <h3 style="font-size:14px;font-weight:500;margin:18px 0 10px">Espécies encontradas</h3>
    <div id="esp-stats" style="display:flex;flex-wrap:wrap;gap:6px"></div>
  </div>
</div>

<script>
const SB_URL = "https://reaeubdtqrwwcttwtcsy.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJlYWV1YmR0cXJ3d2N0dHd0Y3N5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA1NjIxNTMsImV4cCI6MjA3NjEzODE1M30.PZe6PL3-_NHivJys2XXpRmdzzRmmAwKXr9DvajDhp5Q";

let leads = [];
let openId = null;

const TIPOS = [
  ["madeireira","Madeireiras"],["deposito de madeira","Depósitos"],
  ["materiais de construcao madeira","Mat. construção"],["marcenaria","Marcenarias"],
  ["construtora","Construtoras"],["serraria","Serrarias"]
];
let tiposSel = new Set(["madeireira","deposito de madeira"]);

// Supabase fetch
async function fetchLeads(){
  try{
    const r = await fetch(`${SB_URL}/rest/v1/leads_prospeccao?select=*&order=score.desc`, {
      headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` }
    });
    if(!r.ok) throw new Error(r.status);
    leads = await r.json();
  } catch(e){
    console.error("Fetch error:", e);
    leads = [];
  }
  render();
}

// Tabs
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('tab-dashboard').style.display = t.dataset.tab==='dashboard'?'':'none';
    document.getElementById('tab-buscar').style.display = t.dataset.tab==='buscar'?'':'none';
    document.getElementById('tab-stats').style.display = t.dataset.tab==='stats'?'':'none';
  });
});

// Filters
['fil-q','fil-af','fil-st','fil-cid'].forEach(id=>{
  document.getElementById(id).addEventListener(id==='fil-q'?'input':'change', render);
});

// Search tab
const raioEl = document.getElementById('s-raio');
raioEl.addEventListener('input', ()=> document.getElementById('s-raio-val').textContent = raioEl.value+' km');

// Tipo chips
const chipsEl = document.getElementById('tipo-chips');
TIPOS.forEach(([v,l])=>{
  const c = document.createElement('div');
  c.className = 'tipo-chip' + (tiposSel.has(v)?' on':'');
  c.textContent = l;
  c.addEventListener('click',()=>{
    if(tiposSel.has(v)) tiposSel.delete(v); else tiposSel.add(v);
    c.classList.toggle('on');
    updateBtnBuscar();
  });
  chipsEl.appendChild(c);
});

const cidadeEl = document.getElementById('s-cidade');
cidadeEl.addEventListener('input', updateBtnBuscar);

function updateBtnBuscar(){
  const btn = document.getElementById('btn-buscar');
  btn.disabled = !cidadeEl.value.trim() || tiposSel.size===0;
}

document.getElementById('btn-buscar').addEventListener('click', ()=>{
  const cidade = cidadeEl.value.trim();
  if(!cidade || tiposSel.size===0) return;
  const raio = raioEl.value;
  const tipos = [...tiposSel].join(', ');
  // Open Google Places search in new tab for manual review
  const q = encodeURIComponent(`${[...tiposSel][0]} ${cidade}`);
  window.open(`https://www.google.com/maps/search/${q}`, '_blank');
  alert(`Busca iniciada para: ${cidade} (${raio}km)\nTipos: ${tipos}\n\nO Google Maps abriu em nova aba.\nPara adicionar leads automaticamente, use o Claude com o comando:\n\n"Buscar leads em ${cidade} num raio de ${raio}km. Tipos: ${tipos}"`);
});

function getFiltered(){
  const q = document.getElementById('fil-q').value.toLowerCase();
  const af = document.getElementById('fil-af').value;
  const st = document.getElementById('fil-st').value;
  const cid = document.getElementById('fil-cid').value;
  return leads.filter(l=>{
    if(q && !l.nome_empresa.toLowerCase().includes(q)) return false;
    if(af && (l.nivel_afinidade_madeira_lei||'desconhecido')!==af) return false;
    if(st && l.status_lead!==st) return false;
    if(cid && `${l.cidade_busca}, ${l.uf_busca}`!==cid) return false;
    return true;
  });
}

function render(){
  const f = getFiltered();
  document.getElementById('total-count').textContent = leads.length;

  // Stats
  const cn = k => leads.filter(l=>(l.nivel_afinidade_madeira_lei||'desconhecido')===k).length;
  document.getElementById('stats-bar').innerHTML = [
    {l:'Total',v:leads.length,bg:'#f0efe8',c:'#1a1a1a'},
    {l:'Mad. de lei',v:cn('alto'),bg:'#E1F5EE',c:'#085041'},
    {l:'Provável',v:cn('medio'),bg:'#FAEEDA',c:'#633806'},
    {l:'A verificar',v:cn('desconhecido'),bg:'#f0efe8',c:'#1a1a1a'},
  ].map(s=>`<div class="stat" style="background:${s.bg}"><div class="stat-label">${s.l}</div><div class="stat-val" style="color:${s.c}">${s.v}</div></div>`).join('');

  // Cities dropdown
  const cidSel = document.getElementById('fil-cid');
  const curVal = cidSel.value;
  const cidades = [...new Set(leads.map(l=>`${l.cidade_busca}, ${l.uf_busca}`))].sort();
  cidSel.innerHTML = '<option value="">Cidade</option>' + cidades.map(c=>`<option value="${c}"${c===curVal?' selected':''}>${c}</option>`).join('');

  document.getElementById('result-count').textContent = `${f.length} resultado${f.length!==1?'s':''}`;

  // Leads list
  const list = document.getElementById('leads-list');
  if(f.length===0){ list.innerHTML='<div class="empty">Nenhum lead</div>'; }
  else {
    list.innerHTML = f.map(l=>{
      const afc = l.nivel_afinidade_madeira_lei || 'desconhecido';
      const af = {alto:{bg:'#E1F5EE',c:'#085041'},medio:{bg:'#FAEEDA',c:'#633806'},desconhecido:{bg:'#f0efe8',c:'#5F5E5A'},baixo:{bg:'#FCEBEB',c:'#791F1F'}}[afc];
      const stc = {quente:{bg:'#E1F5EE',c:'#0F6E56'},morno:{bg:'#FAEEDA',c:'#854F0B'},frio:{bg:'#E6F1FB',c:'#0C447C'},descartado:{bg:'#f0efe8',c:'#444'},novo:{bg:'#f0efe8',c:'#5F5E5A'}}[l.status_lead]||{bg:'#f0efe8',c:'#888'};
      const esp = l.especies_encontradas_site || [];
      const isOpen = openId===l.id;
      return `<div class="lead-card ${afc}${isOpen?' open':''}" data-id="${l.id}">
        <div class="lead-top">
          <span class="score-badge" style="background:${af.bg};color:${af.c}">${l.score}</span>
          <span class="lead-name">${l.nome_empresa}</span>
          <span class="pill" style="background:${stc.bg};color:${stc.c}">${l.status_lead}</span>
        </div>
        <div class="lead-meta">${l.cidade_busca}, ${l.uf_busca} · ${l.telefone||'sem tel'}${l.total_avaliacoes?' · '+l.total_avaliacoes+' aval':''}${l.rating?' · '+Number(l.rating).toFixed(1)+'★':''}</div>
        ${esp.length?'<div class="especies">'+esp.map(e=>`<span class="esp-tag" style="background:${af.bg};color:${af.c}">${e}</span>`).join('')+'</div>':''}
        <div class="lead-detail">
          <div class="addr">${l.endereco_completo||''}</div>
          ${l.website?'<div>Site: '+l.website+'</div>':''}
          <div class="info">${l.score_detalhes||''}</div>
        </div>
      </div>`;
    }).join('');

    list.querySelectorAll('.lead-card').forEach(card=>{
      card.addEventListener('click',()=>{
        const id = card.dataset.id;
        openId = openId===id ? null : id;
        render();
      });
    });
  }

  // Stats tab
  const cityData = {};
  leads.forEach(l=>{
    const k = `${l.cidade_busca}, ${l.uf_busca}`;
    if(!cityData[k]) cityData[k]={t:0,al:0,me:0};
    cityData[k].t++;
    if(l.nivel_afinidade_madeira_lei==='alto') cityData[k].al++;
    if(l.nivel_afinidade_madeira_lei==='medio') cityData[k].me++;
  });
  document.getElementById('city-stats').innerHTML = Object.entries(cityData)
    .sort((a,b)=>b[1].t-a[1].t)
    .map(([c,d])=>`<div class="city-row"><span class="city-name">${c}</span><div style="display:flex;gap:4px">
      <span class="pill" style="background:#fff;color:#888">${d.t}</span>
      ${d.al?`<span class="pill alto-bg alto-c">${d.al} lei</span>`:''}
      ${d.me?`<span class="pill medio-bg medio-c">${d.me} prov</span>`:''}
    </div></div>`).join('');

  const espData = {};
  leads.forEach(l=>(l.especies_encontradas_site||[]).forEach(e=>{espData[e]=(espData[e]||0)+1}));
  document.getElementById('esp-stats').innerHTML = Object.entries(espData)
    .sort((a,b)=>b[1]-a[1])
    .map(([e,c])=>`<span class="pill alto-bg alto-c" style="padding:4px 10px;font-size:12px">${e} (${c})</span>`).join('') || '<span style="font-size:12px;color:#888">Nenhuma espécie detectada</span>';
}

// Init
fetchLeads();
</script>
</body>
</html>
