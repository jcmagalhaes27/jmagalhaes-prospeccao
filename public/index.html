<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JMagalhães — Prospecção de Madeireiras</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f7f4;color:#1a1a1a;min-height:100vh}
.app{max-width:800px;margin:0 auto;padding:16px}
h1{font-size:20px;font-weight:600}
.sub{font-size:13px;color:#888;margin-bottom:20px}
.tabs{display:flex;gap:4px;border-bottom:1px solid #e5e3dc;margin-bottom:16px}
.tab{padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;color:#888}
.tab.on{border-bottom-color:#1a1a1a;color:#1a1a1a}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.stat{border-radius:8px;padding:10px 12px}
.stat small{font-size:11px;color:#888}
.stat b{display:block;font-size:22px}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.filters input,.filters select{font-size:12px;padding:6px 8px;border:1px solid #e5e3dc;border-radius:6px;background:#fff;outline:none}
.filters input:focus,.filters select:focus{border-color:#1D9E75}
.filters input{flex:1;min-width:100px}
.rc{font-size:12px;color:#888;margin-bottom:10px}
.card{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:6px;cursor:pointer}
.card:hover{box-shadow:0 0 0 1px #ccc}
.card.af-alto{border:2px solid #5DCAA5}
.card.af-medio{border:1px solid #EF9F27}
.card.af-desconhecido{border:1px solid #e5e3dc}
.card.af-baixo{border:1px solid #F09595;opacity:.6}
.row{display:flex;align-items:center;gap:8px}
.badge{font-size:12px;font-weight:600;padding:2px 10px;border-radius:6px;min-width:32px;text-align:center}
.name{font-size:14px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill{font-size:11px;font-weight:500;padding:2px 8px;border-radius:6px;white-space:nowrap}
.meta{font-size:12px;color:#888;margin-top:4px}
.tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
.tag{font-size:10px;padding:1px 6px;border-radius:4px}
.detail{margin-top:10px;padding-top:10px;border-top:1px solid #f0efe8;font-size:12px;display:none}
.card.open .detail{display:block}
.detail .addr{color:#888;margin-bottom:4px}
.detail .info{color:#888;font-style:italic;line-height:1.6;margin-top:6px}
.btns{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.btn{font-size:11px;padding:5px 10px;border:1px solid #e5e3dc;border-radius:6px;background:#fff;cursor:pointer;text-decoration:none;color:#1a1a1a}
.btn:hover{background:#f0efe8}
.btn-go{background:#1D9E75;color:#fff;border:none;padding:12px;font-size:14px;font-weight:500;border-radius:8px;cursor:pointer;width:100%}
.btn-go:hover{background:#178a65}
.btn-go:disabled{background:#e5e3dc;color:#888;cursor:default}
label.sec{font-size:12px;color:#888;display:block;margin-bottom:4px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:12px;padding:5px 10px;border-radius:6px;cursor:pointer;border:1px solid #e5e3dc;background:#fff;user-select:none}
.chip.on{border-color:#1D9E75;background:#E1F5EE}
.crow{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:#f0efe8;border-radius:8px;margin-bottom:4px;font-size:13px}
.empty{text-align:center;padding:30px;color:#888;font-size:13px}
input[type=range]{width:100%;margin:4px 0}
</style>
</head>
<body>

<p class="sub">Madeiras de lei · Serrarias RO e AM · <span id="cnt">0</span> leads</p>
<div class="tabs" id="tabs"></div>
<div id="page"></div>
</div>
<script>
const LEADS=[
{id:"8f12",n:"Madeibrás Madeireira",e:"Av. Atlântica, 660 - Socorro, São Paulo - SP",t:"+55 11 5686-7244",c:"São Paulo",u:"SP",tr:"madeireira atacado",s:"quente",sc:85,r:4.9,av:591,af:"alto",sp:["cumaru","cambará","cedrinho","garapeira","ipê"],d:"+40 afinidade alta (5 espécies) | +15 porte | +5 tel | +5 site | +15 madeireira"},

{id:"0ce7",n:"Serraria Petrópolis",e:"R. Cel. Duarte da Silveira, 605 - Petrópolis - RJ",t:"+55 24 2243-6300",c:"Petrópolis",u:"RJ",tr:"serraria",s:"morno",sc:50,r:4.6,av:97,af:"desconhecido",sp:[],d:"Verificar manualmente"},

{id:"f3bb",n:"Madeireira Palowa - GMAD",e:"Rua dos Tupis, 1699 - Barro Preto, BH - MG",t:"+55 31 3275-2727",c:"Belo Horizonte",u:"MG",tr:"madeireira",s:"morno",sc:40,r:4.4,av:264,af:"desconhecido",sp:[],d:"A verificar"},

{id:"27ae",n:"Madeireira Belo Horizonte",e:"Av. Waldomiro Lobo, 2181 - BH - MG",t:"+55 31 3497-7090",c:"Belo Horizonte",u:"MG",tr:"madeireira",s:"morno",sc:40,r:4.5,av:28,af:"desconhecido",sp:[],d:"A verificar"},
{id:"ca20",n:"Shopping do Telhado",e:"R. Alm. Custódio de Melo, 36 - Resende - RJ",t:"+55 24 3360-7620",c:"Resende",u:"RJ",tr:"mat construcao",s:"morno",sc:38,r:4.4,av:143,af:"desconhecido",sp:[],d:"A verificar"},
{id:"01fb",n:"Grupo Madeireira do Vale",e:"Av. Alm. Adalberto, 6264 - Volta Redonda - RJ",t:"+55 24 3340-0074",c:"Volta Redonda",u:"RJ",tr:"madeireira",s:"frio",sc:35,r:3.8,av:132,af:"desconhecido",sp:[],d:"A verificar"},
{id:"ecbc",n:"Grupo Mad. do Vale - Barra Mansa",e:"Rod. Pres. Dutra, km 265 - Barra Mansa - RJ",t:"+55 24 99278-5273",c:"Barra Mansa",u:"RJ",tr:"madeireira",s:"frio",sc:35,r:3.9,av:12,af:"desconhecido",sp:[],d:"A verificar"},

{id:"2abe",n:"Wood Woodpecker",e:"R. São Jorge, 48 - Resende - RJ",t:"+55 24 3355-3555",c:"Resende",u:"RJ",tr:"madeireira",s:"frio",sc:35,r:4.3,av:49,af:"desconhecido",sp:[],d:"A verificar"},
{id:"d86f",n:"Madeireira RAFAN",e:"Estr. União e Indústria, 7394 - Petrópolis - RJ",t:"+55 24 99238-1541",c:"Petrópolis",u:"RJ",tr:"madeireira",s:"frio",sc:35,r:4.3,av:76,af:"desconhecido",sp:[],d:"A verificar"},
{id:"6917",n:"Ricardo Atacadista de Madeiras",e:"Av. Jacu-Pêssego, 38 - São Paulo - SP",t:"+55 11 2642-3535",c:"São Paulo",u:"SP",tr:"madeireira atacado",s:"frio",sc:35,r:5.0,av:11,af:"desconhecido",sp:[],d:"A verificar"},
{id:"8a9a",n:"Horizon Distribuidora de Madeiras",e:"Av. Pres. Wilson, 2500 - Mooca, SP",t:"+55 11 2063-8941",c:"São Paulo",u:"SP",tr:"madeireira atacado",s:"frio",sc:30,r:5.0,av:1,af:"desconhecido",sp:[],d:"A verificar"},
{id:"8277",n:"H M Rosa Madeiras",e:"Av. Presidente Kennedy, 2822 - Barra Mansa - RJ",t:"+55 24 3323-1131",c:"Barra Mansa",u:"RJ",tr:"madeireira",s:"frio",sc:30,r:3.4,av:57,af:"desconhecido",sp:[],d:"Rating baixo 3.4"},
{id:"50a9",n:"GMAD Volta Redonda",e:"Av. Retiro, 3030 - Volta Redonda - RJ",t:"+55 24 3212-4844",c:"Volta Redonda",u:"RJ",tr:"deposito",s:"descartado",sc:15,r:4.8,av:41,af:"baixo",sp:[],d:"Foco em MDF/compensados"},
{id:"3413",n:"Renovar Madeiras",e:"BR-040, 65 - Petrópolis - RJ",t:"+55 24 2023-1096",c:"Petrópolis",u:"RJ",tr:"madeireira",s:"descartado",sc:10,r:4.6,av:141,af:"baixo",sp:[],d:"Foco em eucalipto"},
{id:"2b95",n:"Billnicius Madeiras",e:"R. Hyvio Naliato, 465 - Petrópolis - RJ",t:"+55 24 2246-0991",c:"Petrópolis",u:"RJ",tr:"madeireira",s:"descartado",sc:10,r:4.7,av:45,af:"baixo",sp:[],d:"Foco em MDF"}
];

const AFC={alto:{bg:"#E1F5EE",c:"#085041",bd:"#5DCAA5"},medio:{bg:"#FAEEDA",c:"#633806",bd:"#EF9F27"},desconhecido:{bg:"#F1EFE8",c:"#5F5E5A",bd:"#B4B2A9"},baixo:{bg:"#FCEBEB",c:"#791F1F",bd:"#F09595"}};
const STC={quente:{bg:"#E1F5EE",c:"#0F6E56"},morno:{bg:"#FAEEDA",c:"#854F0B"},frio:{bg:"#E6F1FB",c:"#0C447C"},descartado:{bg:"#F1EFE8",c:"#444"}};

let tab="dash",openId=null;
const $=id=>document.getElementById(id);
const TIPOS=[["madeireira","Madeireiras"],["deposito de madeira","Depósitos"],["materiais de construcao madeira","Mat. construção"],["marcenaria","Marcenarias"],["construtora","Construtoras"],["serraria","Serrarias"]];
let tiposSel=new Set(["madeireira","deposito de madeira"]);

function pill(t,bg,c){return `<span class="pill" style="background:${bg};color:${c}">${t}</span>`}

function init(){
  $("cnt").textContent=LEADS.length;
  $("tabs").innerHTML=["dash:Dashboard","buscar:Buscar","stats:Resumo"].map(x=>{const[k,l]=x.split(":");return `<button class="tab${tab===k?" on":""}" onclick="switchTab('${k}')">${l}</button>`}).join("");
  if(tab==="dash")renderDash();
  else if(tab==="buscar")renderBuscar();
  else renderStats();
}

function switchTab(t){tab=t;openId=null;init()}

function getF(){
  const q=document.querySelector("#fq")?.value?.toLowerCase()||"";
  const af=document.querySelector("#faf")?.value||"";
  const st=document.querySelector("#fst")?.value||"";
  const ci=document.querySelector("#fci")?.value||"";
  return LEADS.filter(l=>{
    if(q&&!l.n.toLowerCase().includes(q))return false;
    if(af&&(l.af||"desconhecido")!==af)return false;
    if(st&&l.s!==st)return false;
    if(ci&&(l.c+", "+l.u)!==ci)return false;
    return true;
  });
}

function renderDash(){
  const cn=k=>LEADS.filter(l=>l.af===k).length;
  const cids=[...new Set(LEADS.map(l=>l.c+", "+l.u))].sort();
  let h=`<div class="stats">
    <div class="stat" style="background:#f0efe8"><small>Total</small><b>${LEADS.length}</b></div>
    <div class="stat" style="background:#E1F5EE"><small>Mad. de lei</small><b style="color:#085041">${cn("alto")}</b></div>
    <div class="stat" style="background:#FAEEDA"><small>Provável</small><b style="color:#633806">${cn("medio")}</b></div>
    <div class="stat" style="background:#f0efe8"><small>A verificar</small><b>${cn("desconhecido")}</b></div>
  </div>
  <div class="filters">
    <input id="fq" placeholder="Buscar..." oninput="renderList()">
    <select id="faf" onchange="renderList()"><option value="">Afinidade</option><option value="alto">Mad. de lei</option><option value="medio">Provável</option><option value="desconhecido">A verificar</option><option value="baixo">Descartado</option></select>
    <select id="fst" onchange="renderList()"><option value="">Status</option><option value="quente">Quente</option><option value="morno">Morno</option><option value="frio">Frio</option><option value="descartado">Descartado</option></select>
    <select id="fci" onchange="renderList()"><option value="">Cidade</option>${cids.map(c=>`<option value="${c}">${c}</option>`).join("")}</select>
  </div>
  <div class="rc" id="rc"></div>
  <div id="ll"></div>`;
  $("page").innerHTML=h;
  renderList();
}

function renderList(){
  const f=getF();
  $("rc").textContent=f.length+" resultado"+(f.length!==1?"s":"");
  if(!f.length){$("ll").innerHTML='<div class="empty">Nenhum lead</div>';return}
  $("ll").innerHTML=f.map(l=>{
    const a=AFC[l.af]||AFC.desconhecido, st=STC[l.s]||STC.frio;
    const o=openId===l.id;
    return `<div class="card af-${l.af}${o?" open":""}" onclick="toggle('${l.id}')">
      <div class="row">
        <span class="badge" style="background:${a.bg};color:${a.c}">${l.sc}</span>
        <span class="name">${l.n}</span>
        ${pill(l.s,st.bg,st.c)}
      </div>
      <div class="meta">${l.c}, ${l.u} · ${l.t}${l.av?" · "+l.av+" aval":""}${l.r?" · "+l.r.toFixed(1)+"★":""}</div>
      ${l.sp.length?'<div class="tags">'+l.sp.map(s=>`<span class="tag" style="background:${a.bg};color:${a.c}">${s}</span>`).join("")+"</div>":""}
      <div class="detail">
        <div class="addr">${l.e}</div>
        <div class="info">${l.d}</div>
        <div class="btns">
          <a class="btn" href="https://www.google.com/maps/search/${encodeURIComponent(l.n+" "+l.c+" "+l.u)}" target="_blank">Ver no Maps</a>
          <a class="btn" href="https://wa.me/${l.t.replace(/\D/g,"")}" target="_blank">WhatsApp</a>
          <a class="btn" href="https://www.google.com/search?q=${encodeURIComponent(l.n+" "+l.c+" madeira de lei")}" target="_blank">Pesquisar site</a>
        </div>
      </div>
    </div>`}).join("");
}

function toggle(id){openId=openId===id?null:id;renderList()}

function renderBuscar(){
  let h=`<div style="margin-bottom:14px"><label class="sec">Cidade / região</label>
    <input type="text" id="scid" placeholder="Ex: Uberlândia MG, Curitiba PR..." style="width:100%;padding:8px 10px;font-size:14px;border:1px solid #e5e3dc;border-radius:6px" oninput="updBtn()"></div>
  <div style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;margin-bottom:4px"><label class="sec">Raio</label><span id="rv" style="font-size:14px;font-weight:500">50 km</span></div>
    <input type="range" id="sr" min="10" max="200" step="10" value="50" oninput="$('rv').textContent=this.value+' km'">
  </div>
  <div style="margin-bottom:14px"><label class="sec" style="margin-bottom:6px">Tipos</label>
    <div class="chips" id="chips"></div>
  </div>
  <button class="btn-go" id="bgo" disabled onclick="doBusca()">Buscar madeireiras</button>
  <p style="font-size:11px;color:#888;margin-top:8px;text-align:center">Abre o Google Maps pra você ver os resultados na região</p>`;
  $("page").innerHTML=h;
  const ch=$("chips");
  TIPOS.forEach(([v,l])=>{
    const d=document.createElement("div");
    d.className="chip"+(tiposSel.has(v)?" on":"");
    d.textContent=l;
    d.onclick=()=>{if(tiposSel.has(v))tiposSel.delete(v);else tiposSel.add(v);d.classList.toggle("on");updBtn()};
    ch.appendChild(d);
  });
}

function updBtn(){const b=$("bgo");b.disabled=!$("scid").value.trim()||tiposSel.size===0}

function doBusca(){
  const c=$("scid").value.trim(),r=$("sr").value;
  const t=[...tiposSel][0];
  window.open("https://www.google.com/maps/search/"+encodeURIComponent(t+" "+c),"_blank");
}

function renderStats(){
  const cd={};
  LEADS.forEach(l=>{const k=l.c+", "+l.u;if(!cd[k])cd[k]={t:0,al:0,me:0};cd[k].t++;if(l.af==="alto")cd[k].al++;if(l.af==="medio")cd[k].me++});
  const esp={};
  LEADS.forEach(l=>(l.sp||[]).forEach(e=>{esp[e]=(esp[e]||0)+1}));
  let h=`<h3 style="font-size:14px;font-weight:500;margin-bottom:10px">Por cidade</h3>`;
  h+=Object.entries(cd).sort((a,b)=>b[1].t-a[1].t).map(([c,d])=>
    `<div class="crow"><span style="font-weight:500">${c}</span><div style="display:flex;gap:4px">
      ${pill(d.t,"#fff","#888")}${d.al?pill(d.al+" lei","#E1F5EE","#085041"):""}${d.me?pill(d.me+" prov","#FAEEDA","#633806"):""}
    </div></div>`).join("");
  h+=`<h3 style="font-size:14px;font-weight:500;margin:18px 0 10px">Espécies encontradas</h3><div style="display:flex;flex-wrap:wrap;gap:6px">`;
  h+=Object.entries(esp).sort((a,b)=>b[1]-a[1]).map(([e,c])=>
    `<span class="pill" style="background:#E1F5EE;color:#085041;padding:4px 10px;font-size:12px">${e} (${c})</span>`).join("")||'<span style="font-size:12px;color:#888">Nenhuma espécie</span>';
  h+="</div>";
  $("page").innerHTML=h;
}

init();
</script>
</body>
</html>
